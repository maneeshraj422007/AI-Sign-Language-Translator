<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sign Language Translator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark glass-nav shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-translate"></i>
            AI Sign Language Translator
        </a>

        <button class="btn btn-outline-light" id="theme-toggle">
            <i class="bi bi-moon-stars-fill"></i>
        </button>

    </div>
</nav>

<!-- ================= MAIN ================= -->

<div class="container py-4">

    <div class="row g-4">

        <!-- Camera -->
        <div class="col-lg-8">

            <div class="card glass-card">

                <div class="card-header d-flex justify-content-between">

                    <h4>
                        <i class="bi bi-camera-video-fill"></i>
                        Live Camera
                    </h4>

                    <span class="badge bg-success" id="status">
                        Ready
                    </span>

                </div>

                <div class="card-body">

                    <img
                        id="video"
                        class="camera-frame"
                        src=""
                        alt="Camera Stream"
                    >

                </div>

            </div>

        </div>

        <!-- Right Panel -->

        <div class="col-lg-4">

            <!-- Gesture -->

            <div class="card glass-card mb-3">

                <div class="card-body">

                    <h5>

                        <i class="bi bi-hand-index-thumb-fill"></i>

                        Detected Gesture

                    </h5>

                    <h2 id="gesture">

                        --

                    </h2>

                </div>

            </div>

            <!-- Translation -->

            <div class="card glass-card mb-3">

                <div class="card-body">

                    <h5>

                        <i class="bi bi-chat-left-text-fill"></i>

                        Translation

                    </h5>

                    <p id="translation">

                        Waiting...

                    </p>

                </div>

            </div>

            <!-- Confidence -->

            <div class="card glass-card mb-3">

                <div class="card-body">

                    <h5>

                        <i class="bi bi-bar-chart-fill"></i>

                        Confidence

                    </h5>

                    <div class="progress">

                        <div
                            id="confidence-bar"
                            class="progress-bar progress-bar-striped progress-bar-animated"
                            style="width:0%"
                        >

                            <span id="confidence">

                                0%

                            </span>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Language -->

            <div class="card glass-card mb-3">

                <div class="card-body">

                    <h5>

                        <i class="bi bi-globe2"></i>

                        Language

                    </h5>

                    <select class="form-select" id="language">

                        <option value="en-US">English</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="te-IN">Telugu</option>
                        <option value="ta-IN">Tamil</option>
                        <option value="kn-IN">Kannada</option>
                        <option value="ml-IN">Malayalam</option>
                        <option value="mr-IN">Marathi</option>
                        <option value="gu-IN">Gujarati</option>
                        <option value="bn-IN">Bengali</option>
                        <option value="pa-IN">Punjabi</option>
                        <option value="ur-PK">Urdu</option>
                        <option value="es-ES">Spanish</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="it-IT">Italian</option>
                        <option value="pt-PT">Portuguese</option>
                        <option value="ru-RU">Russian</option>
                        <option value="ja-JP">Japanese</option>
                        <option value="ko-KR">Korean</option>
                        <option value="zh-CN">Chinese</option>
                        <option value="ar-SA">Arabic</option>

                    </select>

                </div>

            </div>

        </div>

    </div>

    <!-- Controls -->

    <div class="card glass-card mt-4">

        <div class="card-body text-center">

            <button class="btn btn-success m-2" id="start-btn">

                <i class="bi bi-play-fill"></i>

                Start Camera

            </button>

            <button class="btn btn-danger m-2" id="stop-btn">

                <i class="bi bi-stop-fill"></i>

                Stop Camera

            </button>

            <button class="btn btn-primary m-2" id="speak-btn">

                <i class="bi bi-volume-up-fill"></i>

                Speak

            </button>

            <button class="btn btn-warning m-2" id="clear-btn">

                <i class="bi bi-trash-fill"></i>

                Clear

            </button>

        </div>

    </div>

</div>

<!-- Footer -->

<footer class="text-center py-4">

    AI Sign Language Translator • Flask • MediaPipe • TensorFlow

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="script.js"></script>

</body>
</html>
